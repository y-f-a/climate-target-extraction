[run]
pipeline = "rag"
pipeline_version = "rag.v1"
model_alias = "gpt5_2"
model_name = "gpt-5.2-2025-12-11"
judge_model_name = "gpt-5-mini-2025-08-07"
years = ["2024"]
company_tickers = ["NVDA", "AAPL"]
run_count = 1
index_policy = "reuse_or_build"
parent_run_id = ""
changed_components = []
change_reason = ""
baseline_run_id = ""

[prompts]
extract_version = "v001"
eval_version = "v001"

[versions]
pdf_conversion = "v1"
node_splitting = "v1"
indexing = "v1"
retrieval = "v1"
evaluator = "v1"

[paths]
artifacts_root = "artifacts"
parsed_docs_root = "artifacts/parsed_docs"
reference_targets_dir = "data/evaluation_set/reference_targets"
source_docs_root_env = "CTE_SOURCE_DOCS_DIR"
env_file = ".env.local"

[settings]
embedding_model = "text-embedding-3-large"
chunk_size = 8192
chunk_overlap = 512
similarity_top_k = 10
fusion_top_k = 5
max_tokens = 16390
temperature = 0.0

pdf_source_mode = "local_parser"
pdf_parse_provider = "llamaparse"
pdf_parse_profile = "hq_auto_v1"
pdf_parse_settings_version = "v1"
pdf_parse_result_type = "markdown"
pdf_parse_language = "en"
pdf_parse_ocr_mode = "auto"
pdf_parse_premium_mode = true
pdf_parse_extract_layout = true
pdf_parse_adaptive_long_table = true
pdf_parse_high_res_ocr = true
pdf_parse_auto_mode = true
pdf_parse_auto_trigger_tables = true
pdf_parse_auto_trigger_images = true

[company_info]
NVDA = "NVIDIA Corporation"
AAPL = "Apple Inc"
